services:
  postgres:
    image: postgres:17
    container_name: paperclip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-paperclip}"
      POSTGRES_USER: "${POSTGRES_USER:-paperclip}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-paperclip}"
    volumes:
      - "${PAPERCLIP_DATA_DIR:-./data/docker-paperclip}/postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperclip} -d ${POSTGRES_DB:-paperclip}"]
      interval: 10s
      timeout: 5s
      retries: 10

  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paperclip
    restart: unless-stopped
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      DATABASE_URL: "${DATABASE_URL}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GH_TOKEN: "${GH_TOKEN:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GIT_CONFIG_COUNT: "${GIT_CONFIG_COUNT:-0}"
      GIT_CONFIG_KEY_0: "${GIT_CONFIG_KEY_0:-}"
      GIT_CONFIG_VALUE_0: "${GIT_CONFIG_VALUE_0:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${PAPERCLIP_DATA_DIR:-./data/docker-paperclip}:/paperclip"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - |
        if [ ! -f /paperclip/instances/default/config.json ]; then
          pnpm paperclipai onboard --yes
        fi
        exec pnpm paperclipai run
