services:
  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: paperclip-cloudflared
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/macbot12i5/paperclip/deploy:/etc/cloudflared:ro
    command: ["tunnel", "--config", "/etc/cloudflared/cloudflared-company-unicrawl.yml", "run"]
